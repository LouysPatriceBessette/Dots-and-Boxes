name: Deployment
on:
  push:
    branches:
      - main

jobs:
  Explore-GitHub-Actions:
    runs-on: ubuntu-24.04
    environment: Dots_and_Boxes
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.22.2'
          cache: 'npm'
      - run: npm install

      - name: Run build
        run: npm run build --if-present

      - name: Copy dist to vps
        uses: appleboy/scp-action@master
        with:
          # Selecting all folders except "node_modules"
          source: ".,!node_modules"
          target: /var/www/dots.incoherences.org
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
      - run: echo "Deployment is ${{ job.status }}."

      - name: Execute Remote Bash Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /var/www/restarter
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            . ./restart.sh 3002 > /dev/null 2>&1 &
            